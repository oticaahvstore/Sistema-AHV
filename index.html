<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pedidos - ÓTICA AHV STORE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #1a237e; 
            --secondary: #4CAF50; 
            --lab: #9C27B0; 
            --border: #888; 
            --input-height: 28px; 
            --radius: 8px; 
        }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #e2e8f0; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* TELA DE LOGIN */
        #login-screen { position: fixed; inset: 0; background: #ffffff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: #ffffff; padding: 30px; border-radius: 15px; display: flex; flex-direction: column; gap: 15px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid var(--border); }
        .login-box input { height: 40px; border: 1px solid var(--border); padding: 10px; border-radius: var(--radius); }
        .login-box button { height: 45px; background: var(--secondary); color: white; border: none; font-weight: bold; border-radius: var(--radius); cursor: pointer; }

        /* LARGURA COMPACTA */
        #sistema-content { display: none; width: 190mm; } 
        
        .toolbar { width: 100%; background: #333; padding: 8px 15px; display: flex; gap: 10px; border-radius: 12px 12px 0 0; align-items: center; color: white; border: 1px solid #000; }
        .page { width: 100%; min-height: 290mm; padding: 15px; background: #fff; border-radius: 0 0 12px 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; border: 2px solid #555; }
        
        .section-title { color: var(--primary); font-weight: 800; margin: 8px 0 4px; padding-left: 8px; border-left: 5px solid var(--primary); text-transform: uppercase; font-size: 10px; }
        
        .eye-row { 
            display: flex; 
            align-items: flex-end; 
            gap: 6px; 
            margin-bottom: 5px; 
            background: #f8f9fa; 
            padding: 6px 10px; 
            border-radius: var(--radius); 
            border: 1.5px solid #777; 
        }
        .eye-row.perto { background: #fffcf0; border-color: #b8860b; }
        .eye-row.lentes { background: #f0f7ff; border-color: #4682b4; }
        
        .eye-label { background: #fff; border: 1.5px solid #555; border-radius: 6px; width: 38px; height: var(--input-height); display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--primary); font-size: 10px; }
        
        .input-group { display: flex; flex-direction: column; flex: 1; }
        .input-group label { font-size: 8px; color: #333; font-weight: 800; margin-bottom: 1px; text-transform: uppercase; }
        
        select, input, textarea { 
            height: var(--input-height); 
            border: 1px solid #666; 
            border-radius: 6px; 
            font-size: 10px; 
            padding: 0 6px; 
            background: white; 
            width: 100%; 
            color: #000;
        }
        textarea { height: 45px; padding: 6px; resize: none; margin-top: 4px; border: 1.5px solid #777; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 5px; margin-bottom: 5px; }
        .logo img { height: 50px; } 
        .store-info { text-align: right; font-size: 8px; color: #000; font-weight: bold; line-height: 1.1; }
        
        .footer-buttons { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        .btn { width: 55px; height: 45px; border: 1px solid #000; border-radius: 12px; color: white; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 6px rgba(0,0,0,0.2); }
        .btn-save { background: var(--secondary); }
        .btn-print { background: var(--primary); }
        .btn-lab { background: var(--lab); }
        .btn-new { background: #546e7a; }

        .search-select { flex: 2; background: #444; color: white; border: 1px solid #000; height: 30px; border-radius: 8px; }

        @media print { 
            body { padding: 0; background: none; } 
            .no-print { display: none !important; } 
            #sistema-content { display: block !important; width: 210mm; }
            .page { box-shadow: none; border: 1px solid #000; padding: 5mm; }
            
            select { -webkit-appearance: none; -moz-appearance: none; appearance: none; background: none !important; border: 1px solid #000 !important; }
            input, select, textarea { box-shadow: none !important; border: 1px solid #000 !important; color: #000 !important; }

            body.modo-lab .financeiro-section, 
            body.modo-lab .sensivel { display: none !important; }
            body.modo-lab .cliente-titulo::after { content: " (VIA LABORATÓRIO)"; color: var(--lab); font-size: 12px; margin-left: 10px; }
            .eye-row { border: 1px solid #000 !important; }
        }
    </style>
</head>
<body>

    <div class="login-box">

<script>
    const _supabase = supabase.createClient('https://gxeuheqhpsapigyozanu.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4ZXVoZXFocHNhcGlneW96YW51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNzU3NDcsImV4cCI6MjA4OTc1MTc0N30.h_Yqrj959cpXFKSYO3wrvGQ7RXO5QEL2NeRy1QqfQJc');
    const TABELA = 'pedidos';

    /* --- TEMPORIZADOR DE SEGURANÇA (5 MINUTOS) --- */
    let timerInatividade;
    const TEMPO_LIMITE = 300000; // 5 minutos em milissegundos

    function resetarTimer() {
        if (typeof timerInatividade !== 'undefined') clearTimeout(timerInatividade);
        timerInatividade = setTimeout(() => {
            alert("Sessão encerrada por inatividade (5 minutos).");
            fazerLogout();
        }, TEMPO_LIMITE); 
    }

    // Monitoramento de Atividade
    window.onload = resetarTimer;
    document.onmousemove = resetarTimer;
    document.onmousedown = resetarTimer;
    document.onkeypress = resetarTimer;
    document.ontouchstart = resetarTimer;
    document.onclick = resetarTimer;

    function imprimirGeral() { document.body.classList.remove('modo-lab'); window.print(); }
    function imprimirLaboratorio() { document.body.classList.add('modo-lab'); window.print(); }

    async function fazerLogin() {
        const user = document.getElementById('user_login').value.trim();
        const pass = document.getElementById('pass_login').value;
        const email = user.includes('@') ? user : user + "@ahvstore.com";
        const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
        if (error) return alert("Usuario ou Senha Invalidos!");
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('sistema-content').style.display = 'block';
        resetarTimer();
        atualizarSelectBusca();
    }

    async function fazerLogout() { 
        await _supabase.auth.signOut(); 
        location.reload(); 
    }

    async function salvarPedido() {
        const os = document.getElementById('num_os').value;
        const nome = document.getElementById('nome_cliente').value;
        if(!os || !nome) return alert("Preencha Nome e O.S.");
        const dados = {};
        const numFields = ['m_ponte', 'm_aro_h', 'm_aro_v', 'm_aro_m', 'vlr_armacao', 'vlr_lentes', 'vlr_desconto'];
        document.querySelectorAll('input, select, textarea').forEach(el => { 
            if(el.id && !['user_login','pass_login','select_busca'].includes(el.id)) {
                dados[el.id] = el.value === "" ? null : (numFields.includes(el.id) ? parseFloat(el.value) : el.value);
            }
        });
        const { error } = await _supabase.from(TABELA).upsert(dados, { onConflict: 'num_os' });
        if (error) alert("Erro: " + error.message); else alert("Pedido salvo com sucesso!");
        atualizarSelectBusca();
    }

    async function atualizarSelectBusca() {
        const { data } = await _supabase.from(TABELA).select('num_os, nome_cliente').order('num_os', { ascending: false });
        const s = document.getElementById('select_busca');
        s.innerHTML = '<option value="">-- Selecione um Pedido --</option>';
        if (data) data.forEach(p => s.add(new Option(`${p.num_os} | ${p.nome_cliente}`, p.num_os)));
    }

    async function carregarPedidoSelecionado(os) {
        if(!os) return;
        const { data: p } = await _supabase.from(TABELA).select('*').eq('num_os', os).single();
        if(p) { 
            Object.keys(p).forEach(k => { 
                const el = document.getElementById(k); 
                if(el) {
                    if(k.includes('tipo_lente')) { el.value = p[k]; filtrarLentes(k.split('_')[2]); }
                    el.value = p[k];
                }
            }); 
            calcularTotal(); atualizarTudo(); 
        }
    }

    const listaLentes = [
        { cod: "001", tipo: "Visão Simples Acabado", nome: "Zurich Lens 1.56 FSV HCM", preco: 170.00 },
        { cod: "002", tipo: "Visão Simples Acabado", nome: "Zurich Lens 1.56 FSV HCM Cyl Extension", preco: 220.00 },
        { cod: "003", tipo: "Visão Simples Acabado", nome: "Zurich Lens 1.56 FSV Blue Cut HCM", preco: 270.00 },

        { cod: "005", tipo: "Visão Simples Acabado", nome: "Zurich Lens 1.59 PC FSV HCM", preco: 220.00 },
        { cod: "006", tipo: "Visão Simples Acabado", nome: "Zurich Lens 1.59 PC FSV HCM Cyl Extension", preco: 280.00 },
        { cod: "007", tipo: "Visão Simples Acabado", nome: "Zurich Lens 1.59 PC FSV Blue Cut HCM", preco: 350.00 },
        { cod: "008", tipo: "Visão Simples Acabado", nome: "Zurich Lens 1.59 PC FSV Blue Cut HCM Cyl Extension", preco: 410.00 },
        { cod: "009", tipo: "Visão Simples Acabado", nome: "Zurich Lens 1.61 FSV HCM", preco: 375.00 },
        { cod: "010", tipo: "Visão Simples Acabado", nome: "Zurich Lens 1.61 FSV HCM Cyl Extension", preco: 450.00 },
        { cod: "011", tipo: "Visão Simples Acabado", nome: "Zurich Lens 1.61 FSV Blue Cut HCM", preco: 490.00 },
        { cod: "012", tipo: "Visão Simples Acabado", nome: "Zurich Lens 1.61 FSV Blue Cut HCM Cyl Extension", preco: 550.00 },
        { cod: "013", tipo: "Visão Simples Acabado", nome: "Zurich Lens 1.56 FSV SunSense HCM", preco: 350.00 },
        { cod: "014", tipo: "Visão Simples Acabado", nome: "Zurich Lens 1.56 FSV SunSense HCM Cyl Extension", preco: 400.00 },

    const tabelaTratamentos = { "Sem AR": 0, "Duravision Chrome UV": 400, "Duravision Silver UV": 890, "Duravision Platinum UV": 1150, "Mar": 199, "Mar Extra": 299, "HMC Blue": 399, "C.O. Clean": 99, "HiperClean SHA": 132, "HiperClean Max+": 245, "HiperClean Dual+": 316, "HiperClean Blue": 316 };

    function preencherSeletores() {
        const fmt = (n) => (n > 0 ? "+" : "") + n.toFixed(2).replace('.', ',');
        document.querySelectorAll('.sel-esf').forEach(s => { s.add(new Option("", "")); for (let i = 15; i >= -20; i -= 0.25) s.add(new Option(i === 0 ? "0,00" : fmt(i), i.toFixed(2))); });
        document.querySelectorAll('.sel-cil').forEach(s => { s.add(new Option("", "")); for (let i = 0; i >= -8; i -= 0.25) s.add(new Option(i.toFixed(2).replace('.', ','), i.toFixed(2))); });
        document.querySelectorAll('.sel-eixo').forEach(s => { s.add(new Option("", "")); for (let i = 0; i <= 180; i++) s.add(new Option(i + "°", i)); });
        document.querySelectorAll('.sel-add').forEach(s => { s.add(new Option("", "")); for (let i = 0; i <= 4.5; i += 0.25) s.add(new Option(fmt(i), i.toFixed(2))); });
    }

    function atualizarTudo() {
        ['od', 'oe'].forEach(l => {
            const esf = parseFloat(document.getElementById(`e_${l}_l`).value) || 0, add = parseFloat(document.getElementById(`add_${l}`).value) || 0, dnp = parseFloat(document.getElementById(`dnp_${l}_l`).value) || 0;
            if(document.getElementById(`e_${l}_l`).value || document.getElementById(`add_${l}`).value) {
                const t = esf + add; document.getElementById(`e_${l}_p`).value = t === 0 ? "Plano" : (t > 0 ? "+" : "") + t.toFixed(2).replace('.', ',');
            }
            const cilOp = document.getElementById(`c_${l}_l`).options[document.getElementById(`c_${l}_l`).selectedIndex];
            document.getElementById(`c_${l}_p`).value = (cilOp && cilOp.value) ? cilOp.text : "";
            document.getElementById(`x_${l}_p`).value = document.getElementById(`x_${l}_l`).value ? document.getElementById(`x_${l}_l`).value + "°" : "";
            document.getElementById(`dnp_${l}_p`).value = dnp ? (dnp - 2.5).toFixed(1).replace('.', ',') : "";
            document.getElementById(`alt_${l}_p`).value = document.getElementById(`alt_${l}_l`).value;
        });
        calcularDiametro();
    }

    function calcularDiametro() {
        const p = parseFloat(document.getElementById('m_ponte').value) || 0, ah = parseFloat(document.getElementById('m_aro_h').value) || 0, am = parseFloat(document.getElementById('m_aro_m').value) || 0;
        const dnp = Math.max(parseFloat(document.getElementById('dnp_od_l').value) || 0, parseFloat(document.getElementById('dnp_oe_l').value) || 0);
        if(p && ah && am && dnp) document.getElementById('m_diametro').value = "Ø " + Math.ceil((p + ah) - (dnp * 2) + (am + 2));
    }

    function calcularTotal() {
        const armacao = parseFloat(document.getElementById('vlr_armacao').value) || 0, lentes = parseFloat(document.getElementById('vlr_lentes').value) || 0, desconto = parseFloat(document.getElementById('vlr_desconto').value) || 0;
        document.getElementById('vlr_total').value = "R$ " + (armacao + lentes - desconto).toFixed(2).replace('.', ',');
    }

    function mascaraCPF(i) { let v = i.value.replace(/\D/g, ""); v = v.replace(/(\d{3})(\d)/, "$1.$2"); v = v.replace(/(\d{3})(\d)/, "$1.$2"); v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2"); i.value = v; }
    function mascaraTel(i) { let v = i.value.replace(/\D/g, ""); v = v.replace(/^(\d{2})(\d)/g, "($1) $2"); v = v.replace(/(\d{5})(\d)/, "$1-$2"); i.value = v; }
    function mascaraCEP(i) { let v = i.value.replace(/\D/g, ""); v = v.replace(/^(\d{5})(\d)/, "$1-$2"); i.value = v; }
    
    function filtrarLentes(l) { 
        const t = document.getElementById(`tipo_lente_${l}`).value;
        const s = document.getElementById(`nome_lente_${l}`);
        const arSel = document.getElementById(`ar_${l}`);
        const cilValor = parseFloat(document.getElementById(`c_${l}_l`).value) || 0;

        if (t === "Visão Simples Acabado") {
            arSel.value = "Sem AR"; arSel.disabled = true; arSel.style.background = "#eeeeee";
        } else {
            arSel.disabled = false; arSel.style.background = "white";
        }

        s.innerHTML = '<option value=""></option>'; 
        let lentesFiltradas = listaLentes.filter(x => x.tipo === t);

        if (t.includes("Visão Simples") && cilValor < -2.00) {
            lentesFiltradas = lentesFiltradas.filter(x => x.nome.includes("Extension") || x.nome.includes("Extendido"));
        } else if (t.includes("Visão Simples") && cilValor >= -2.00 && cilValor != 0) {
            lentesFiltradas = lentesFiltradas.filter(x => !x.nome.includes("Extension") && !x.nome.includes("Extendido"));
        }

        lentesFiltradas.forEach(x => s.add(new Option(x.nome, x.nome))); 
        atualizarPrecoAutomatico();
    }

    function buscarPorCodigo(l) { const c = document.getElementById(`cod_lente_${l}`).value, x = listaLentes.find(i => i.cod === c); if(x) { document.getElementById(`tipo_lente_${l}`).value = x.tipo; filtrarLentes(l); document.getElementById(`nome_lente_${l}`).value = x.nome; atualizarPrecoAutomatico(); } }
    function buscarPorNome(l) { const n = document.getElementById(`nome_lente_${l}`).value, x = listaLentes.find(i => i.nome === n); document.getElementById(`cod_lente_${l}`).value = x ? x.cod : ""; atualizarPrecoAutomatico(); }

    function atualizarPrecoAutomatico() {
        const codOD = document.getElementById('cod_lente_od').value;
        const codOE = document.getElementById('cod_lente_oe').value;
        const arOD = document.getElementById('ar_od').value;
        const arOE = document.getElementById('ar_oe').value;
        const tipoOD = document.getElementById('tipo_lente_od').value;
        const tipoOE = document.getElementById('tipo_lente_oe').value;

        let totalLentes = 0;
        const lOD = listaLentes.find(l => l.cod === codOD); if (lOD) totalLentes += (lOD.preco / 2);
        const lOE = listaLentes.find(l => l.cod === codOE); if (lOE) totalLentes += (lOE.preco / 2);
        
        if (tipoOD !== "Visão Simples Acabado") totalLentes += (tabelaTratamentos[arOD] || 0) / 2;
        if (tipoOE !== "Visão Simples Acabado") totalLentes += (tabelaTratamentos[arOE] || 0) / 2;

        document.getElementById('vlr_lentes').value = totalLentes.toFixed(2);
        calcularTotal();
    }

    function novoPedido() {
        if(confirm("Deseja limpar os campos para um novo pedido?")) {
            document.querySelectorAll('input, select, textarea').forEach(el => {
                if(!['user_login','pass_login','select_busca'].includes(el.id)) {
                    el.value = "";
                    if(el.id.startsWith('ar_')) { el.disabled = false; el.style.background = "white"; }
                }
            });
            document.getElementById('data_os').value = new Date().toISOString().split('T')[0];
            document.getElementById('select_busca').value = "";
            resetarTimer();
        }
    }

    window.onload = function() { preencherSeletores(); document.getElementById('data_os').value = new Date().toISOString().split('T')[0]; resetarTimer(); };
